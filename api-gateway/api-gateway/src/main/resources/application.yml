server:
  port: 8080


spring:
  cloud:
    gateway:

      routes:

        - id: user-service
          uri: http://localhost:8081
          predicates:
            - Path=/users/**



        - id: product-service
          uri: http://localhost:8082
          predicates:
            - Path=/products/**



        - id: order-service
          uri: http://localhost:8083
          predicates:
            - Path=/orders/**

jwt:
  secret: "my-secret-key-123456789-my-secret"